# FORGE local development stack (Phase 3)
# Usage:
#   docker compose up -d          # redis + api + worker + beat
#   docker compose up -d redis    # redis only (run api on host)

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - forge_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./engine
    ports:
      - "8000:8000"
    environment:
      FORGE_ROLE: api
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    env_file:
      - ./engine/.env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./engine
    environment:
      FORGE_ROLE: worker
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    env_file:
      - ./engine/.env
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./engine
    environment:
      FORGE_ROLE: beat
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    env_file:
      - ./engine/.env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  forge_redis: