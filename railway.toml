# Railway — FORGE API service (Phase 3)
# Deploy worker + beat as separate services with same Dockerfile.
# Set FORGE_ROLE=worker or FORGE_ROLE=beat on those services.
# See engine/PHASE3-WORKERS.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "engine/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"